[package]
name    = "bulletin-core"
version.workspace = true
edition.workspace = true
publish = false

[features]
default = ["thread-weighting"]
# The compile-time kill switch for the Thread layer's *consumption* on the digest hot path: the
# relevance term and fire-time thread-assignment (digest-thread-layer.md §5.2). Build with
# `--no-default-features` to take that path off the build entirely; the deterministic recency digest
# is unaffected. (The `thread_maintenance` write side is harmless either way.)
thread-weighting = []

[dependencies]
anyhow      = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
uuid        = { workspace = true }
chrono      = { workspace = true }
chrono-tz   = { workspace = true }
sha2        = { workspace = true }
hmac        = { workspace = true }
hex         = { workspace = true }
sqlx        = { workspace = true }
tokio       = { workspace = true }
tracing     = { workspace = true }
reqwest          = { workspace = true }
rss              = { workspace = true }
atom_syndication = { workspace = true }
lettre           = { workspace = true }

[dev-dependencies]
proptest               = { workspace = true }
axum                   = { workspace = true }
hmac                   = { workspace = true }  # tests compute a valid webhook signature to verify against
hex                    = { workspace = true }
sha2                   = { workspace = true }
uuid                   = { workspace = true, features = ["v4"] }  # tests build random ids
testcontainers         = { workspace = true }
testcontainers-modules = { workspace = true }
