syntax = "proto3";

// Bulletin service API, v1. The admin plane: control-plane management + read access that mirrors the
// `bulletin debug …` operator commands over gRPC. Every RPC authenticates an admin bearer and runs its
// DB work in the engine's `ScopeCtx::Admin` control-plane context (the core store fns self-scope).
// Breaking changes go to a new `v2` package — never edit a shipped v1 message's wire layout.
package bulletin.v1;

import "google/protobuf/timestamp.proto";

// Admin plane → ScopeCtx::Admin (control-plane + public content only; no backdoor to a tenant's
// private content — that is served only by the subscriber plane under that subscriber's own token).
service AdminService {
  // Connections (mirrors `debug connection-add / connection-list / connection-rm`).
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc CreateConnection(CreateConnectionRequest) returns (Connection);
  rpc DeleteConnection(DeleteConnectionRequest) returns (DeleteConnectionResponse);

  // Subscribers (mirrors `debug subscriber-add / subscriber-list / subscriber-rm`).
  rpc ListSubscribers(ListSubscribersRequest) returns (ListSubscribersResponse);
  rpc CreateSubscriber(CreateSubscriberRequest) returns (Subscriber);
  rpc DeleteSubscriber(DeleteSubscriberRequest) returns (DeleteSubscriberResponse);

  // Subscriptions: the sources (connections) that comprise a subscriber's digest (mirrors
  // `debug subscription-add / subscription-list / subscription-rm`).
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse);
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);

  // Ops / read (mirrors `debug status / event-list / digest-list`). Digest content is metadata only —
  // the private items live behind the subscriber plane.
  rpc GetStatus(GetStatusRequest) returns (StatusReport);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc ListDigests(ListDigestsRequest) returns (ListDigestsResponse);

}

// The UNSTABLE debug/operator plane. This is a *separate service* on purpose: the instability is
// encoded in the service name itself, so it survives code generation — it shows up as
// `UnstableDebugService` in the generated server trait + client, in gRPC reflection, and on the wire
// path (`/bulletin.v1.UnstableDebugService/…`). A comment alone would vanish at codegen; the name
// does not.
//
// These RPCs back the `bulletin debug …` operator commands (build-run / digest-run / digest-dispatch /
// digest-explain / digest-eval / digest-provenance / config / config-set) and are EXEMPT from the v1
// wire-compatibility guarantee on AdminService: their request/response shapes (and the messages they
// use) may change or be removed in any release without a version bump. They exist to drive the
// first-party CLI — do NOT build external integrations on them; use AdminService for that.
//
// It runs under the same admin bearer + `ScopeCtx::Admin` as AdminService. The two send RPCs deliver
// server-side, so the operator running the CLI needs no SMTP credential — the engine holds it; the
// selection/eval RPCs are read-only dry-runs.
service UnstableDebugService {
  rpc RunBuild(RunBuildRequest) returns (RunBuildResponse);
  rpc RunDigest(RunDigestRequest) returns (DigestOutcome);
  rpc DispatchDigest(DispatchDigestRequest) returns (DigestOutcome);
  rpc ExplainDigest(ExplainDigestRequest) returns (ExplainDigestResponse);
  rpc EvalDigest(EvalDigestRequest) returns (EvalDigestResponse);
  rpc GetDigestProvenance(GetDigestProvenanceRequest) returns (GetDigestProvenanceResponse);
  rpc GetConfig(GetConfigRequest) returns (ScoringConfig);
  rpc SetConfig(SetConfigRequest) returns (ScoringConfig);
}

// ── Connections ────────────────────────────────────────────────────────────
message Connection {
  string id = 1;                                   // uuid
  string source = 2;                               // rss | github | …
  string status = 3;                               // active | paused | errored | …
  string config_json = 4;                          // the connection's JSON config blob
  int64 poll_interval_secs = 5;
  google.protobuf.Timestamp next_poll_at = 6;
  optional google.protobuf.Timestamp last_polled_at = 7;
  int32 consecutive_failures = 8;
  optional string subscriber_id = 9;               // owning subscriber (absent = global/public source)
}

message ListConnectionsRequest {}
message ListConnectionsResponse { repeated Connection connections = 1; }

message CreateConnectionRequest {
  string source = 1;                               // rss | github | …
  string config_json = 2;                          // e.g. {"url":"https://…/feed.xml"}
  int64 poll_interval_secs = 3;                    // 0 ⇒ server default (900s)
  optional string owner = 4;                       // subscriber uuid; required for a private-capable source
}

message DeleteConnectionRequest { string id = 1; }
message DeleteConnectionResponse { bool deleted = 1; }

// ── Subscribers ──────────────────────────────────────────────────────────────
message Subscriber {
  string id = 1;
  string email = 2;
  optional string name = 3;
  string freq = 4;                                 // daily | weekly
  optional int32 weekday = 5;                      // 0=Sun..6=Sat, present iff weekly
  int32 max_items = 6;
  string timezone = 7;                             // IANA name
  string digest_time = 8;                          // local HH:MM
  google.protobuf.Timestamp next_run_at = 9;
  optional google.protobuf.Timestamp last_run_at = 10;
}

message ListSubscribersRequest {}
message ListSubscribersResponse { repeated Subscriber subscribers = 1; }

message CreateSubscriberRequest {
  string email = 1;
  optional string name = 2;
  string freq = 3;                                 // empty ⇒ "daily"
  optional int32 weekday = 4;                      // required iff freq = weekly
  string timezone = 5;                             // empty ⇒ "UTC"
  string digest_time = 6;                          // empty ⇒ "09:00" (HH:MM)
}

message DeleteSubscriberRequest { string id = 1; }
message DeleteSubscriberResponse { bool deleted = 1; }

// ── Subscriptions (subscriber ↔ source) ──────────────────────────────────────
message SubscribeRequest {
  string subscriber = 1;                           // subscriber uuid
  string connection = 2;                           // connection (source) uuid
}
message SubscribeResponse { bool created = 1; }    // false ⇒ already subscribed

message UnsubscribeRequest {
  string subscriber = 1;
  string connection = 2;
}
message UnsubscribeResponse { bool removed = 1; }  // false ⇒ wasn't subscribed

message ListSubscriptionsRequest { string subscriber = 1; }
message ListSubscriptionsResponse { repeated Connection connections = 1; }

// ── Ops / read ───────────────────────────────────────────────────────────────
message GetStatusRequest {}

message StatusReport {
  ConnectionStats connections = 1;
  EventStats events = 2;
  BuildStatus build = 3;
  ClusterStats clusters = 4;
  SubscriberStats subscribers = 5;
  DigestStats digests = 6;
  // Apalis queue counts by job type. `queue_initialized` is false when the apalis schema isn't set up
  // yet (run `migrate`), in which case `queue` is empty.
  bool queue_initialized = 7;
  repeated QueueStats queue = 8;
}

message ConnectionStats { int64 total = 1; int64 active = 2; int64 paused = 3; int64 errored = 4; int64 due_now = 5; }
message EventStats {
  int64 total = 1;
  int64 unbuilt = 2;
  optional google.protobuf.Timestamp latest_ingest = 3;
  repeated SourceCount by_source = 4;
}
message SourceCount { string source = 1; int64 count = 2; }
message BuildStatus { google.protobuf.Timestamp built_through = 1; int64 lag_secs = 2; }
message ClusterStats { int64 total = 1; optional google.protobuf.Timestamp latest_updated = 2; }
message SubscriberStats { int64 total = 1; int64 daily = 2; int64 weekly = 3; int64 due_now = 4; optional google.protobuf.Timestamp next_run = 5; int64 subscriptions = 6; }
message DigestStats { int64 total = 1; int64 pending = 2; int64 delivered = 3; optional google.protobuf.Timestamp last_delivered = 4; }
message QueueStats {
  string job_type = 1;
  int64 pending = 2;
  int64 running = 3;
  int64 done = 4;
  int64 failed = 5;
  int64 killed = 6;
  optional int64 oldest_pending_secs = 7;
}

message ListEventsRequest { int64 limit = 1; }                 // 0 ⇒ default (20)
message ListEventsResponse { repeated EventSummary events = 1; }
message EventSummary {
  google.protobuf.Timestamp ingest_time = 1;
  string source = 2;
  string title = 3;
  repeated string links = 4;
}

message ListDigestsRequest { int64 limit = 1; }                // 0 ⇒ default (20)
message ListDigestsResponse { repeated DigestSummary digests = 1; }
message DigestSummary {
  string id = 1;
  string subscriber_email = 2;
  google.protobuf.Timestamp window_end = 3;
  optional google.protobuf.Timestamp delivered_at = 4;
  int64 item_count = 5;
}

// ══════════════════════════════════════════════════════════════════════════════════════════════
// UNSTABLE: debug/operator messages. Everything below backs the `bulletin debug …` CLI and is EXEMPT
// from the v1 wire-compatibility guarantee — these shapes may change or disappear in any release
// without a version bump. Not for external integration.
// ══════════════════════════════════════════════════════════════════════════════════════════════

// ── Pipeline build (debug build-run) ─────────────────────────────────────────
message RunBuildRequest {}
message RunBuildResponse {
  bool skipped = 1;                                // another build already in progress
  uint64 dirty_groups = 2;                         // groups (re)built this run; 0 when skipped
  optional google.protobuf.Timestamp built_through = 3;  // new watermark; absent when skipped
}

// ── Digest send (debug digest-run / digest-dispatch) ─────────────────────────
// Delivered server-side by the engine's own mailer, so the caller carries no SMTP credential.
message RunDigestRequest { string subscriber = 1; }
message DispatchDigestRequest {
  string subscriber = 1;
  int32 lookback_days = 2;                         // 0 ⇒ default (7)
}
// Mirrors core's DigestOutcome. `items` is meaningful only for kind = "delivered".
message DigestOutcome {
  string kind = 1;                                 // delivered | empty | already_delivered | not_yet_due
  uint64 items = 2;
}

// ── Selection dry-run (debug digest-explain) ─────────────────────────────────
message ExplainDigestRequest { string subscriber = 1; }
message ExplainDigestResponse { repeated ExplainRow rows = 1; }
// One candidate story's verdict + the scoring rationale behind it. Exactly one of position / rank /
// drop_cause is set, keyed to `verdict`.
message ExplainRow {
  string verdict = 1;                              // SELECTED | OVER_CAP | DROPPED
  optional uint64 position = 2;                    // set iff SELECTED
  optional uint64 rank = 3;                        // set iff OVER_CAP
  optional string drop_cause = 4;                  // set iff DROPPED
  google.protobuf.Timestamp last_event_time = 5;
  string source = 6;                               // representative source ("?" for an empty story)
  string story_id = 7;
  string format = 8;                               // story | note
  string richness = 9;
  float relevance = 10;
  float priority = 11;
  string title = 12;
  repeated ExplainConnection connections = 13;     // the fused clusters (the cross-source value)
}
message ExplainConnection {
  string source = 1;
  string title = 2;
  optional string link_reason = 3;
}

// ── Eval harness (debug digest-eval) ─────────────────────────────────────────
message EvalDigestRequest {
  string subscriber = 1;
  int64 limit = 2;                                 // 0 ⇒ default (50)
  optional string trial_config_json = 3;           // a ScoringConfig JSON ⇒ A/B sweep vs the live config
}
message EvalDigestResponse {
  // The metrics report(s), pre-rendered by core's Metrics formatter — the wire carries no layout, the
  // single source of formatting truth stays in core. `trial` is present iff trial_config_json was set.
  string baseline = 1;
  optional string trial = 2;
}

// ── Story provenance (debug digest-provenance) ───────────────────────────────
message GetDigestProvenanceRequest { string story_id = 1; }
message GetDigestProvenanceResponse { repeated TimelineEntry entries = 1; }
message TimelineEntry {
  google.protobuf.Timestamp event_time = 1;
  string source = 2;
  string title = 3;
  optional string link = 4;
}

// ── Scoring config (debug config / config-set) ───────────────────────────────
message ScoringConfig {
  float relevance_floor = 1;
  float scope_bonus = 2;
  float severity_weight = 3;
  double recency_half_life_days = 4;
  double thread_half_life_days = 5;
  uint64 story_cap = 6;
  uint64 note_cap = 7;
  float resurface_penalty = 8;
}
message GetConfigRequest {}
// Sparse update: only the fields present change; the server merges onto the live config and returns it.
message SetConfigRequest {
  optional float relevance_floor = 1;
  optional float scope_bonus = 2;
  optional float severity_weight = 3;
  optional double recency_half_life_days = 4;
  optional double thread_half_life_days = 5;
  optional uint64 story_cap = 6;
  optional uint64 note_cap = 7;
  optional float resurface_penalty = 8;
}
